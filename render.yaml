# Render.com configuration file
# Documentation: https://render.com/docs/blueprint-spec

services:
  # Web Service - FastAPI Backend + Frontend
  - type: web
    name: deutsch-b1-app
    env: docker
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: deutsch-b1-db
          property: connectionString

databases:
  # PostgreSQL Database
  - name: deutsch-b1-db
    databaseName: deutsch_b1
    user: deutsch_b1_user
    plan: free
    region: frankfurt
